name: ChimneySweepLog
options:
  bundleIdPrefix: com.shimondeitel.chimneylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ChimneySweepLog:
    type: application
    platform: iOS
    sources:
      - path: ChimneySweepLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chimneylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ChimneySweepLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChimneySweepLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChimneySweepLogTests
      - path: ChimneySweepLog.storekit
    dependencies:
      - target: ChimneySweepLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chimneylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ChimneySweepLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChimneySweepLogUITests
    dependencies:
      - target: ChimneySweepLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chimneylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ChimneySweepLog:
    build:
      targets:
        ChimneySweepLog: all
        ChimneySweepLogTests: [test]
        ChimneySweepLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ChimneySweepLog.storekit
    test:
      config: Debug
      storeKitConfiguration: ChimneySweepLog.storekit
      targets:
        - ChimneySweepLogTests
        - ChimneySweepLogUITests
    archive:
      config: Release
